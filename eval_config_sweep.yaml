model_base: "gpt2"
# LoRA adapter directory (set in your environment)
model_finetuned: "${SCRITTI_EVAL_LORA_PATH}"
prompt_set: "prompts.txt"

generation:
  temperature: [0.2, 0.7, 1.0]
  top_p: [0.9]
  max_tokens: 120
  batch_size: 4

metrics:
  - meter_score
  - semantic_similarity
  - repetition_index
  - perplexity

output:
  log_dir: "eval_logs"
  run_name: "style_tradeoff_v1"
