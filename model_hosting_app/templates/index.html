<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ model_name }} · inference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0d0b;
    --surface: #161410;
    --border: #2c2820;
    --text: #d4cfc8;
    --muted: #635e57;
    --accent: #c8974f;
    --accent-lo: #c8974f22;
    --model-bg: #13110f;
    --user-bg: #1a1713;
    --font-serif: 'IM Fell English', Georgia, serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --radius: 2px;
    --ease: cubic-bezier(.22,.68,0,1.2);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
    z-index: 9999;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 780px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 12px;
  }

  .header-left { display: flex; align-items: baseline; gap: 10px; }

  .header-title {
    font-family: var(--font-serif);
    font-size: 19px;
    color: var(--accent);
    letter-spacing: .01em;
  }

  .header-model {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #3a3a3a;
    flex-shrink: 0;
    transition: background .4s;
  }

  .status-dot.live { background: #6db56d; box-shadow: 0 0 6px #6db56d88; }
  .status-dot.thinking { background: var(--accent); animation: pulse 1s ease-in-out infinite alternate; }

  @keyframes pulse { from { opacity: .4; } to { opacity: 1; } }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 14px;
    color: var(--muted);
    animation: fadein .6s ease;
  }

  .empty-state .glyph {
    font-family: var(--font-serif);
    font-size: 52px;
    color: var(--border);
    line-height: 1;
  }

  .empty-state p {
    font-size: 12px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .seed-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    max-width: 440px;
  }

  .seed-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }

  .seed-btn:hover { border-color: var(--accent); color: var(--accent); }

  .msg {
    display: flex;
    padding: 0 28px;
    animation: fadein .25s ease;
  }

  .msg + .msg { margin-top: 2px; }
  .msg.user { justify-content: flex-end; }
  .msg.model { justify-content: flex-start; }

  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.75;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-right-radius: 0;
  }

  .msg.model .bubble {
    background: var(--model-bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    color: var(--text);
    font-family: var(--font-serif);
    font-size: 15px;
    line-height: 1.9;
    border-bottom-left-radius: 0;
  }

  .cursor {
    display: inline-block;
    width: 9px;
    height: 15px;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink .7s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .msg-label {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    padding: 0 28px;
  }

  .msg-label.user-label { text-align: right; }
  .msg-label.model-label { text-align: left; color: var(--accent); opacity: .7; }

  .exchange-gap { height: 20px; }

  .input-bar {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 16px 28px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap { flex: 1; position: relative; }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    padding: 10px 14px;
    resize: none;
    outline: none;
    overflow-y: auto;
    min-height: 42px;
    max-height: 160px;
    transition: border-color .2s;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); }

  .send-btn {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    background: var(--accent-lo);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, transform .15s var(--ease);
  }

  .send-btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); transform: scale(1.06); }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; }

  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 7px;
    text-align: right;
    letter-spacing: .04em;
  }

  @media (max-width: 640px) {
    .shell { max-width: 100%; border-left: none; border-right: none; }
    header, .input-bar, .msg, .msg-label { padding-left: 14px; padding-right: 14px; }
    .bubble { max-width: 90%; }
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="header-left">
      <span class="header-title">inference</span>
      <span class="header-model">{{ model_name }}</span>
    </div>
    <div class="status-dot" id="statusDot" title="model status"></div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="glyph">⌘</div>
      <p>send a prompt to begin</p>
      <div class="seed-prompts" id="seedPrompts">
        <button class="seed-btn">resting on the pier</button>
        <button class="seed-btn">the first snow of winter</button>
        <button class="seed-btn">a letter never sent</button>
        <button class="seed-btn">late evening, the city quiets</button>
        <button class="seed-btn">light through old glass</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="promptInput" rows="1" placeholder="enter a prompt..." autocomplete="off" spellcheck="false"></textarea>
      <div class="hint">shift+enter for newline · enter to send</div>
    </div>
    <button class="send-btn" id="sendBtn" title="Generate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('promptInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const emptyState = document.getElementById('emptyState');

function setStatus(state) {
  statusDot.className = 'status-dot' + (state ? ' ' + state : '');
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
}

function scrollBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

function appendLabel(role) {
  const el = document.createElement('div');
  el.className = `msg-label ${role}-label`;
  el.textContent = role === 'user' ? 'you' : 'model';
  messagesEl.appendChild(el);
}

function appendBubble(role, text = '') {
  const row = document.createElement('div');
  row.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollBottom();
  return bubble;
}

document.querySelectorAll('.seed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    inputEl.value = btn.textContent;
    inputEl.focus();
    autoResize();
  });
});

inputEl.addEventListener('input', autoResize);

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

sendBtn.addEventListener('click', handleSend);

async function handleSend() {
  const prompt = inputEl.value.trim();
  if (!prompt || sendBtn.disabled) return;

  if (emptyState) emptyState.style.display = 'none';

  inputEl.value = '';
  inputEl.style.height = 'auto';

  appendLabel('user');
  appendBubble('user', prompt);

  const gap = document.createElement('div');
  gap.className = 'exchange-gap';
  messagesEl.appendChild(gap);

  appendLabel('model');
  const modelBubble = appendBubble('model', '');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  modelBubble.appendChild(cursor);

  sendBtn.disabled = true;
  inputEl.disabled = true;
  setStatus('thinking');

  let fullText = '';

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const chunks = buffer.split('\n\n');
      buffer = chunks.pop() || '';

      for (const chunk of chunks) {
        const line = chunk.trim();
        if (!line.startsWith('data:')) continue;

        const raw = line.slice(5).trim();
        if (!raw) continue;

        let payload;
        try { payload = JSON.parse(raw); } catch { continue; }

        if (payload.done) continue;
        if (payload.error) {
          fullText += `[error: ${payload.error}]`;
          continue;
        }

        if (payload.token) {
          fullText += payload.token;
          modelBubble.textContent = fullText;
          modelBubble.appendChild(cursor);
          scrollBottom();
        }
      }
    }
  } catch (err) {
    fullText = `[connection error: ${err.message}]`;
    modelBubble.textContent = fullText;
  }

  cursor.remove();
  modelBubble.textContent = fullText || '...';

  const gap2 = document.createElement('div');
  gap2.className = 'exchange-gap';
  messagesEl.appendChild(gap2);

  sendBtn.disabled = false;
  inputEl.disabled = false;
  setStatus('live');
  inputEl.focus();
  scrollBottom();
}

(async () => {
  try {
    const r = await fetch('/health');
    if (r.ok) setStatus('live');
  } catch {
    setStatus('');
  }
})();
</script>
</body>
</html>
